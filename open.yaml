proxy-groups:
  - name: Proxy
    type: select
    proxies:
      - "sh121"
      - "sh121"

  - name: Auto
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    proxies:
      - "sh121"
      - "sh121"

  - name: Fallback
    type: fallback
    url: http://www.gstatic.com/generate_204
    interval: 300
    proxies:
      - "sh121"
      - "sh121"

rules:
  - GEOIP,CN,DIRECT
  - MATCH,Proxy

proxies:
  - name: "sh121"
    type: "vmess"
    server: "82.198.246.97"
    port: 180
    uuid: "d13fc2f5-3e05-4795-81eb-44143a09e552"
    alterId: 0
    cipher: "auto"
    tls: false
    network: "tcp"



